name: CI

on:
  push:
    branches: [main]
  pull_request:

# Phase 1 stub: the meaningful hardware-free gate is the :protocol unit suite.
# Android assembly is added once the transport/UI layers stabilise.
jobs:
  protocol-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run :protocol unit tests
        run: ./gradlew :protocol:test --no-daemon
